<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能语音情绪识别与事中干预系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080c1a;
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    @keyframes breath {
      0%, 100% { box-shadow: 0 0 20px rgba(239,68,68,0.3), inset 0 0 40px rgba(239,68,68,0.05); }
      50% { box-shadow: 0 0 60px rgba(239,68,68,0.7), 0 0 120px rgba(239,68,68,0.25), inset 0 0 60px rgba(239,68,68,0.1); }
    }
    @keyframes breathGreen {
      0%, 100% { box-shadow: 0 0 20px rgba(34,197,94,0.15), inset 0 0 30px rgba(34,197,94,0.02); }
      50% { box-shadow: 0 0 40px rgba(34,197,94,0.3), inset 0 0 40px rgba(34,197,94,0.05); }
    }
    @keyframes breathAmber {
      0%, 100% { box-shadow: 0 0 20px rgba(251,191,36,0.2), inset 0 0 30px rgba(251,191,36,0.02); }
      50% { box-shadow: 0 0 50px rgba(251,191,36,0.4), inset 0 0 40px rgba(251,191,36,0.05); }
    }
    .alert-breath { animation: breath 1.8s ease-in-out infinite; }
    .alert-breath-green { animation: breathGreen 2s ease-in-out infinite; }
    .alert-breath-amber { animation: breathAmber 2s ease-in-out infinite; }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(239,68,68,0.3); }
      50% { border-color: rgba(239,68,68,0.8); }
    }
    .border-pulse-red { animation: borderGlow 1.8s ease-in-out infinite; }
    .script-card { transition: all 0.25s ease; }
    .script-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(59,130,246,0.2);
      border-color: #3b82f6 !important;
    }
    .copy-hint { opacity: 0; transition: opacity 0.2s ease; }
    .script-card:hover .copy-hint { opacity: 1; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(4,6,16,0.85); backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: linear-gradient(145deg, #0e1428, #121a30);
      border: 1px solid #1e293b; border-radius: 20px;
      width: 820px; max-height: 88vh; overflow-y: auto;
      padding: 36px 40px; box-shadow: 0 0 80px rgba(59,130,246,0.08);
    }
    .customer-avatar-lg {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 2px solid #334155; display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #94a3b8;
    }
    .customer-avatar-sm {
      width: 44px; height: 44px; border-radius: 12px; border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #94a3b8; cursor: pointer;
      transition: all 0.2s ease; background: #131b2f;
    }
    .customer-avatar-sm:hover { border-color: #3b82f6; background: #1a2540; color: #fff; }
    .customer-avatar-sm.active { border-color: #3b82f6; background: #1a2540; color: #60a5fa; }
    .eval-panel { transition: all 0.4s ease; }
    .eval-panel.collapsed { max-height: 0 !important; overflow: hidden; padding: 0 20px !important; opacity: 0; }
    .eval-panel.expanded { max-height: 600px; opacity: 1; }
    .score-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring circle { fill: none; stroke-width: 6; }
    .score-ring .bg { stroke: #1e293b; }
    .score-ring .fg { stroke-linecap: round; transition: stroke-dashoffset 1s ease, stroke 0.5s ease; }
  </style>
</head>
<body>

  <!-- ===== 接听前弹窗 ===== -->
  <div id="preCallModal" class="modal-overlay">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-white text-lg font-bold">📋 新通话 · 客户预览</h2>
          <p class="text-[#64748b] text-xs mt-1">请先了解客户画像，再点击「接听」开始通话记录</p>
        </div>
        <div class="flex items-center gap-2 text-[#64748b] text-xs bg-[#1e293b] rounded-full px-3 py-1.5">
          <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>待接听
        </div>
      </div>
      <div class="mb-5">
        <div class="text-[#64748b] text-xs mb-2.5 font-medium">👥 客户群像 · 点击切换</div>
        <div id="customerPortfolio" class="flex gap-3"></div>
      </div>
      <div id="selectedCustomerDetail" class="bg-[#0a0f1f] rounded-xl border border-[#1e293b] p-5 mb-5"></div>
      <div class="flex gap-3 justify-end">
        <button onclick="switchToMock()" class="px-5 py-2.5 bg-[#1e293b] hover:bg-[#2a3a50] text-[#94a3b8] rounded-lg text-sm transition">模拟数据演示</button>
        <button onclick="startCall()" class="px-8 py-2.5 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold rounded-lg text-sm transition shadow-lg shadow-green-500/20">✅ 接听 — 开始记录通话</button>
      </div>
    </div>
  </div>

  <!-- ===== 主界面 ===== -->
  <div id="mainApp" class="hidden">
    <header class="bg-[#0e1428] border-b border-[#1e293b] px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg">AI</div>
        <div>
          <h1 class="text-white text-xl font-bold tracking-wide">智能语音情绪识别与事中干预系统</h1>
          <p class="text-[#64748b] text-xs mt-0.5">Real‑time Emotion Recognition & Intervention Platform</p>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <div id="headerCustomerBar" class="flex items-center gap-2"></div>
        <div class="flex items-center gap-3 text-sm">
          <span class="text-[#64748b]">坐席工号</span>
          <span class="text-white font-semibold bg-[#1e293b] px-3 py-1 rounded-md">9527</span>
        </div>
        <div id="callStatusBadge" class="flex items-center gap-2 text-sm bg-[#1e293b] px-4 py-1.5 rounded-full">
          <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
          <span class="text-[#94a3b8]">通话中</span>
          <span id="callTimer" class="text-cyan-400 font-mono font-bold text-base ml-1">00:00</span>
        </div>
        <button onclick="endCall()" class="text-xs bg-red-600/20 hover:bg-red-600/40 text-red-400 border border-red-800/40 px-3 py-1.5 rounded-lg transition">结束通话</button>
      </div>
    </header>

    <main class="p-4 flex flex-col gap-4" style="height: calc(100vh - 80px);">
      <div class="flex gap-4 flex-1" style="min-height:0;">

        <!-- 左侧：情绪实时可视化 -->
        <section class="w-[40%] bg-[#0e1428] rounded-xl border border-[#1e293b] flex flex-col overflow-hidden">
          <div class="px-5 py-3 border-b border-[#1e293b] flex items-center justify-between">
            <h2 class="text-white font-semibold text-sm flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-cyan-400"></span>实时通话情绪波动曲线
            </h2>
            <span class="text-[#64748b] text-xs">情绪等级 1‑5 级</span>
          </div>
          <div id="emotionChart" class="flex-1 w-full" style="min-height:0;"></div>
        </section>

        <!-- 中间：状态预警 -->
        <section class="w-[30%] bg-[#0e1428] rounded-xl border border-[#1e293b] flex flex-col overflow-hidden">
          <div class="px-5 py-3 border-b border-[#1e293b]">
            <h2 class="text-white font-semibold text-sm flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-red-400" id="riskDot"></span>当前通话风险状态
            </h2>
          </div>
          <div id="riskPanel" class="flex-1 flex flex-col items-center justify-center p-5 gap-4">
            <!-- 动态 JS 渲染 -->
          </div>
        </section>

        <!-- 右侧：话术推荐 -->
        <section class="w-[30%] bg-[#0e1428] rounded-xl border border-[#1e293b] flex flex-col overflow-hidden">
          <div class="px-5 py-3 border-b border-[#1e293b]">
            <h2 id="scriptPanelTitle" class="text-white font-semibold text-sm flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-violet-400"></span>实时辅助话术推荐
            </h2>
          </div>
          <div id="scriptPanel" class="flex-1 overflow-y-auto p-4 space-y-3">
            <!-- 动态 JS 渲染 -->
          </div>
        </section>
      </div>

      <!-- 下栏 -->
      <div class="flex flex-col gap-3">
        <div class="bg-[#0e1428] rounded-xl border border-[#1e293b] px-5 py-4 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-amber-400"></span>
            <span class="text-white text-sm font-semibold">离线客户画像看板</span>
            <span class="text-[#64748b] text-xs ml-2">基于历史通话数据离线挖掘 · 前置赋能实时干预</span>
          </div>
          <div id="profileDetail" class="flex items-center gap-8"></div>
        </div>

        <button id="evalToggle" onclick="toggleEvalPanel()" class="flex items-center justify-between bg-[#0e1428] hover:bg-[#141b30] border border-[#1e293b] rounded-xl px-5 py-3 transition w-full text-left">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
            <span class="text-white text-sm font-semibold">📋 通话小结与坐席评价</span>
            <span class="text-[#64748b] text-xs ml-2">通话结束后自动生成 · 帮助坐席提升沟通质量</span>
          </div>
          <svg id="evalArrow" class="w-4 h-4 text-[#64748b] transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>

        <div id="evalPanel" class="eval-panel collapsed bg-[#0e1428] border border-[#1e293b] rounded-xl px-5 overflow-hidden">
          <div id="evalContent" class="py-5"><!-- 动态 JS --></div>
        </div>
      </div>
    </main>
  </div>

    let currentCustomer = customers[0];

    // ===== 工具 =====
    function formatTime(s) {
      return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');

      const container = document.getElementById(containerId);

        const active = c.id === activeId;
        const cls = `customer-avatar-sm ${active?'active':''}`;
        if (size === 'sm') {
          return `<div class="${cls}" onclick="switchCustomer('${c.id}')" title="${c.name} · ${c.tags.join(' / ')}"><span>${c.avatar}</span></div>`;

        return `<div class="${cls} flex-col !w-14 !h-14 gap-0" onclick="switchCustomer('${c.id}')" title="${c.name} · ${c.tags.join(' / ')}">
          <span>${c.avatar}</span>
          <span class="text-[9px] text-[#64748b]">${c.name}</span>

      }).join('');

    // ===== 渲染风险面板 =====

      const el = document.getElementById('scriptPanel');

    // ===== 渲染评价面板 =====
    function renderEvalPanel(c) {
      const el = document.getElementById('evalContent');
      if (!el) return;
      const e = c.eval;
      const scoreColor = e.score >= 85 ? 'text-green-400' : e.score >= 70 ? 'text-amber-400' : 'text-red-400';
      el.innerHTML = `
        <div class="flex gap-6">
          <div class="flex flex-col items-center gap-2 shrink-0">
            <div class="score-ring" style="width:90px;height:90px;">
              <svg width="90" height="90" viewBox="0 0 90 90">
                <circle class="bg" cx="45" cy="45" r="38"/>
                <circle class="fg" id="scoreCircle" cx="45" cy="45" r="38" stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
              </svg>
              <div class="absolute text-white text-2xl font-black ${scoreColor}" id="scoreText">${e.score}</div>
            </div>
            <span class="text-[#64748b] text-xs">综合评分</span>

          <div class="flex-1 grid grid-cols-2 gap-x-8 gap-y-3">

              { label: '情绪稳定性', value: e.stability, color: e.stabilityColor, text: e.stabilityLabel },
              { label: '语速匹配度', value: e.speed, color: e.speedColor, text: e.speedLabel },
              { label: '共情响应时效', value: e.empathy, color: e.empathyColor, text: e.empathyLabel },
              { label: '话术使用准确率', value: e.accuracy, color: e.accuracyColor, text: e.accuracyLabel },
            ].map(d => `<div>
              <div class="text-[#64748b] text-xs mb-1">${d.label}</div>
              <div class="flex items-center gap-2">
                <div class="flex-1 h-1.5 bg-[#1e293b] rounded-full overflow-hidden">
                  <div class="h-full rounded-full" style="width:${d.value}%;background:${d.color === 'green' ? '#22c55e' : d.color === 'red' ? '#ef4444' : d.color === 'amber' ? '#f59e0b' : '#f97316'}"></div>
                </div>
                <span class="text-xs font-bold" style="color:${d.color === 'green' ? '#22c55e' : d.color === 'red' ? '#ef4444' : d.color === 'amber' ? '#f59e0b' : '#f97316'}">${d.text}</span>
              </div>
            </div>`).join('')}
          </div>
          <div class="w-64 shrink-0 bg-[#0a0f1f] rounded-lg border border-[#1e293b] p-4">

            <p class="text-[#94a3b8] text-xs leading-relaxed mb-3">${e.issue}</p>

          </div>
        </div>
      `;
      // 动画驱动评分环
      setTimeout(() => {
        const circle = document.getElementById('scoreCircle');
        if (!circle) return;
        const circumference = 238.76;
        const offset = circumference - (e.score / 100) * circumference;
        circle.style.strokeDashoffset = offset;
        circle.style.stroke = e.score >= 85 ? '#22c55e' : e.score >= 70 ? '#f59e0b' : '#ef4444';
      }, 300);
    }

    // ===== 刷新全部面板 =====
    function refreshAllPanels(c) {
      renderCustomerPortfolio('headerCustomerBar', c.id, 'sm');
      renderProfileBar(c);
      renderRiskPanel(c);
      renderScriptPanel(c);
      renderEvalPanel(c);
      initChart(c);
    }

    // ===== 切换客户 =====
    function switchCustomer(id) {
      currentCustomer = customers.find(c => c.id === id) || customers[0];
      renderCustomerPortfolio('customerPortfolio', currentCustomer.id, 'lg');
      renderCustomerDetail(currentCustomer);
      const mainShown = document.getElementById('mainApp').classList.contains('hidden') === false;
      if (mainShown && isCallActive) {
        refreshAllPanels(currentCustomer);
      } else if (mainShown) {
        refreshAllPanels(currentCustomer);
      }
    }

    // ===== 模拟演示 =====
    function switchToMock() { switchCustomer('chen'); }

    // ===== 接听 =====
    function startCall() {
      document.getElementById('preCallModal').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      isCallActive = true;
      callSeconds = 0;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        callSeconds++;
        document.getElementById('callTimer').textContent = formatTime(callSeconds);
      }, 1000);
      refreshAllPanels(currentCustomer);
    }

    // ===== 结束通话 =====
    function endCall() {
      if (!isCallActive) return;
      isCallActive = false;
      if (timerInterval) clearInterval(timerInterval);
      const elapsed = formatTime(callSeconds);
      document.getElementById('evalPanel').classList.remove('collapsed');
      document.getElementById('evalPanel').classList.add('expanded');
      document.getElementById('evalArrow').classList.add('rotate-180');
      renderEvalPanel(currentCustomer);
      alert(`✅ 通话已结束（时长 ${elapsed}）\n\n客户：${currentCustomer.name}\n评分：${currentCustomer.eval.score}/100\n问题：${currentCustomer.eval.issue}`);
    }

    // ===== 切换评价面板 =====
    function toggleEvalPanel() {
      const p = document.getElementById('evalPanel');
      const a = document.getElementById('evalArrow');
      p.classList.toggle('collapsed');
      p.classList.toggle('expanded');
      a.classList.toggle('rotate-180');
    }

    // ===== 复制话术 =====
    function copyScript(el) {
      const text = el.querySelector('p').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const hint = el.querySelector('.copy-hint');
        const orig = hint.innerHTML;
        hint.innerHTML = '<span class="text-green-400 text-xs">已复制 ✓</span>';
        setTimeout(() => { hint.innerHTML = orig; }, 1200);
      }).catch(() => {
        const r = document.createRange();
        r.selectNodeContents(el.querySelector('p'));
        const s = window.getSelection();
        s.removeAllRanges(); s.addRange(r);
        document.execCommand('copy'); s.removeAllRanges();
      });
    }

    // ===== ECharts =====
    function initChart(c) {
      c = c || currentCustomer;
      const dom = document.getElementById('emotionChart');
      if (!dom) return;
      if (chartInstance) chartInstance.dispose();
      chartInstance = echarts.init(dom, 'dark');
      const em = c.emotion;
      const isRage = c.risk.level >= 4;
      const lineColor = isRage ? '#ef4444' : c.risk.level >= 3 ? '#f59e0b' : '#22c55e';
      const areaStops = isRage
        ? [{ offset: 0, color: 'rgba(239,68,68,0.45)' }, { offset: 1, color: 'rgba(239,68,68,0.02)' }]
        : c.risk.level >= 3
        ? [{ offset: 0, color: 'rgba(251,191,36,0.35)' }, { offset: 1, color: 'rgba(251,191,36,0.02)' }]
        : [{ offset: 0, color: 'rgba(34,197,94,0.3)' }, { offset: 1, color: 'rgba(34,197,94,0.02)' }];
      const option = {
        tooltip: {
          trigger: 'axis', backgroundColor: 'rgba(15,23,42,0.9)', borderColor: '#1e293b',
          textStyle: { color: '#e2e8f0', fontSize: 12 },
          formatter: function(params) {
            const p = params[0]; const v = p.value;
            let label = '';
            if (v <= 1.5) label = '平静愉悦';
            else if (v <= 2.5) label = '轻微不满';
            else if (v <= 3.5) label = '明显烦躁';
            else if (v <= 4.5) label = '生气抵触';
            else label = '暴怒失控';
            return `<div style="font-weight:600;margin-bottom:4px;">${p.axisValue}</div>情绪等级：${v.toFixed(1)} 级 — ${label}`;
          }
        },
        grid: { left: '3%', right: '3%', top: '8%', bottom: '10%' },
        xAxis: {
          type: 'category', data: em.timeLabels,
          axisLine: { lineStyle: { color: '#1e293b' } },
          axisLabel: { color: '#64748b', fontSize: 10, interval: 2 },
          splitLine: { show: false },
        },
        yAxis: {
          type: 'value', min: 0.5, max: 5.5, splitNumber: 5,
          axisLine: { show: false },
          axisLabel: { color: '#64748b', fontSize: 10, formatter: v => ({1:'1 平静',2:'2 不满',3:'3 烦躁',4:'4 生气',5:'5 暴怒'}[v]||v) },
          splitLine: { lineStyle: { color: '#1e293b', type: 'dashed' } },
        },
        series: [{
          type: 'line', data: em.data, smooth: true,
          symbol: 'circle', symbolSize: 6,
          lineStyle: { width: 3, color: lineColor },
          areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: areaStops } },
          markPoint: {
            data: em.marks,
            symbol: 'pin', symbolSize: 48, itemStyle: { color: c.risk.level >= 4 ? '#ef4444' : '#f59e0b' },
            label: { color: '#fff', fontSize: 10, fontWeight: 'bold' }
          },
          markLine: {
            silent: true,
            data: [
              { yAxis: 3, lineStyle: { color: '#f59e0b', type: 'dashed', width: 1 }, label: { formatter: '烦躁阈值', color: '#f59e0b', fontSize: 10 } },
              { yAxis: 5, lineStyle: { color: '#ef4444', type: 'dashed', width: 1 }, label: { formatter: '暴怒阈值', color: '#ef4444', fontSize: 10 } },
            ]
          }
        }]
      };
      chartInstance.setOption(option);
      const ro = new ResizeObserver(() => chartInstance && chartInstance.resize());
      ro.observe(dom);
      window.addEventListener('resize', () => chartInstance && chartInstance.resize());
    }

    // ===== 初始化弹窗 =====
    renderCustomerPortfolio('customerPortfolio', currentCustomer.id, 'lg');
    renderCustomerDetail(currentCustomer);
  </script>

</body>
</html>
